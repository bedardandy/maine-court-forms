name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  fill-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        # requirements.txt pulls the shared maine-forms-engine package that
        # engine/ and the drift/accessibility tools shim over.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run deterministic test suite
        # Blank PDFs are not shipped, so the PDF-dependent fill/split checks
        # auto-skip here; the recipe crash-smoke and placement pins (PDF-free)
        # are the regression gate. The Opus 4.8 judge (test_opus_judge) stays
        # opt-in via MCF_OPUS_JUDGE and never runs in CI.
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_opus_judge.py
      - name: Run deterministic eval suite
        # Product-contract evals (docs/agent-workflow.md): routing recall,
        # workflow-chain integrity, completed-form golden snapshots, trust-tier
        # invariants, warning controls, extraction-golden soundness. The
        # llm/vision layers are gated (MCF_EVAL_LLM / MCF_EVAL_VISION) and skip
        # here. See evals/README.md.
        run: |
          python -m evals.run --layer flow --layer fill --layer llm
